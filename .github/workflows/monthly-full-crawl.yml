name: Monthly Full Documentation Crawl

on:
  schedule:
    - cron: '0 4 1 * *'  # Día 1 de cada mes, 4am UTC
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to crawl (all, ixopay-dev, ixopay-manual, ixopay-modules, tokenex)'
        required: false
        default: 'all'

jobs:
  full-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          playwright install chromium --with-deps

      - name: Backup current manifest
        run: cp docs_manifest.json docs_manifest.backup.json 2>/dev/null || true

      - name: Run full crawl
        run: python scripts/scrape.py --target ${{ github.event.inputs.target || 'all' }}
        env:
          PYTHONUNBUFFERED: '1'

      - name: Clean and format documentation
        run: python scripts/clean.py --input-dir docs/

      - name: Rebuild index
        run: python scripts/build_index.py

      - name: Detect removed pages
        run: |
          if [ -f docs_manifest.backup.json ]; then
            python -c "
          import json
          old = json.load(open('docs_manifest.backup.json'))
          new = json.load(open('docs_manifest.json'))
          old_urls = set(old.get('pages', {}).keys())
          new_urls = set(new.get('pages', {}).keys())
          removed = old_urls - new_urls
          added = new_urls - old_urls
          if removed:
              print(f'Removed pages ({len(removed)}):')
              for u in sorted(removed): print(f'  - {u}')
          if added:
              print(f'New pages ({len(added)}):')
              for u in sorted(added): print(f'  + {u}')
          if not removed and not added:
              print('No pages added or removed')
          "
          fi

      - name: Validate documentation quality
        run: |
          DOC_COUNT=$(find docs/ -name "*.md" | wc -l | tr -d ' ')
          echo "Total documentation files: $DOC_COUNT"
          if [ "$DOC_COUNT" -lt 10 ]; then
            echo "ERROR: Suspiciously low doc count ($DOC_COUNT). Aborting commit."
            exit 1
          fi
          find docs/ -name "*.md" -empty -exec echo "WARNING: Empty file: {}" \;
          echo "Quality gate passed"

      - name: Clean backup
        run: rm -f docs_manifest.backup.json

      - name: Commit changes
        run: |
          git diff --quiet docs/ index.md docs_manifest.json && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED=$(git diff --name-only docs/ index.md docs_manifest.json | wc -l | tr -d ' ')
          git add docs/ index.md docs_manifest.json
          git commit -m "docs: monthly full crawl - ${CHANGED} files updated

          Full re-crawl of all documentation portals.
          $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
